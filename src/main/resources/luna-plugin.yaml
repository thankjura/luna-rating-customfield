# yaml-language-server: $schema=https://raw.githubusercontent.com/thankjura/luna-schemas/refs/heads/master/luna-plugin.schema.json?ver=7

key: ${project.groupId}.${project.artifactId}
name: ${project.name}
version: ${project.version}
description: ${project.description}
vendor:
  name: ${project.organization.name}
  url: ${project.organization.url}

fieldTypes:
  - key: RatingCustomFieldType
    name: Rating customfield type
    className: ru.slie.luna.plugins.field.RatingCustomFieldType
    iconPath: images/rating.png
    viewComponents:
      - path: frontend/RatingFieldView.js
    editComponents:
      - path: frontend/RatingFieldEdit.js
    navigatorComponents:
      - path: frontend/RatingFieldView.js
    optionsComponent:
        name: FieldContextOptions
    resources:
      - key: ratingCss
        path: frontend/frontend.css
        type: css
