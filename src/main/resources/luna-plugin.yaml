# yaml-language-server: $schema=https://raw.githubusercontent.com/thankjura/luna-schemas/refs/heads/master/luna-plugin.schema.json?ver=2

key: ${project.groupId}.${project.artifactId}
name: ${project.name}
version: ${project.version}
description: ${project.description}
vendor:
  name: ${project.organization.name}
  url: ${project.organization.url}

components:
  - key: RatingCustomFieldType
    name: Test customfield type
    className: ru.slie.luna.plugins.field.RatingCustomFieldType
    resources:
      - key:  RatingFieldView
        path: /rating-customfield/RatingFieldView.js
        type: comp
      - key:  RatingFieldEdit
        path: /rating-customfield/RatingFieldEdit.js
        type: comp
      - key:  rating-customfield-styles
        path: /rating-customfield/rating-customfield.css
        type: css